spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/mercadotech
    username: mercadotech
    password: mercadotech
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  batch:
    job:
      enabled: false
